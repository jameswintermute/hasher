# hasher.conf — configuration for Hasher project
# Place in default/ (ship) or local/ (override).
# Lines starting with # are comments.
#
# This local file is intended for user-tunable behaviour only.
# Versioning is handled by the scripts themselves and git tags.

[about]
project   = Hasher — NAS File Hasher & Duplicate Finder
copyright = Copyright (C) 2025 James Wintermute
license   = GNU GPLv3 (https://www.gnu.org/licenses/)

[setup]
# Show extra guidance on the very first run
first_run_help  = true

# Template used when creating a new paths.txt
paths_template  = paths.example.txt

[logging]
# How often (seconds) the background logger prints progress
background-interval = 15

# Logging level: debug|info|warn|error
level = info

# When true, enables shell xtrace in some helpers (noisy; for debugging only)
xtrace = false

[exclusions]
# Whether to merge default shipped exclusions with local overrides
inherit-defaults = true

# Path-based exclusions:
#   local/excludes.txt
#     - one glob per line (case-insensitive)
#     - used to SKIP files/directories entirely (never hashed, never reviewed)
#
# Hash-based duplicate exceptions:
#   local/exceptions-hashes.txt
#     - one SHA256 hash per line
#     - whole duplicate groups with these hashes are skipped in review-duplicates
#
# Extension-based exclusions from duplicate review:
#   local/excluded-from-dedup.txt
#     - one extension per line, without leading dot, case-insensitive
#     - files are hashed and counted in stats, but hidden from review-duplicates
#
# Junk extensions:
#   local/junk-extensions.txt
#     - one extension per line, without leading dot, case-insensitive
#     - files are hashed, but managed via the "delete junk" menu option

[review]
# Which duplicate report to load by default:
#   latest   = use logs/duplicate-hashes-latest.txt
#   ask      = prompt the user
input = latest

# Sort groups when building reports:
#   count_desc = largest duplicate sets first (by count * size)
#   size_desc  = largest total bytes first, etc. (implementation-specific)
sort = count_desc

# Skip zero-length files in deduplication reports/review
skip_zero_size = true

# Minimum file size (MB) to include in duplicate reports
min_size_mb = 0.00

# Optional regex filters (empty = disabled)
include_regex =
exclude_regex =

# Where to write reports (relative to project root)
report_dir = logs

# Prefix report files with date (YYYY-MM-DD-)
report_prefix_date = true

# Limit the number of groups shown in summary outputs (0 = no limit)
summary_limit_groups = 0
